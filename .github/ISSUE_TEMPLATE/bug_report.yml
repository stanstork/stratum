name: Bug report
description: Report a problem with Stratum
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it.
        Remember to redact any real credentials from configs and logs.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Commands, a minimal SMQL config (credentials redacted), and the output.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `stratum version`, or the commit hash you built from.
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Rust version, and the source/destination databases and versions.
    validations:
      required: false
